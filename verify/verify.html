<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FocusLock — Verify Focus Events</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="verify.css">
</head>
<body>
  <div class="verify-page">
    <header class="verify-header">
      <div class="header-brand">
        <div class="logo-mark"></div>
        <h1>Verify focus events</h1>
      </div>
      <a href="#" id="back-link" class="header-link">Back to Settings</a>
    </header>

    <main class="verify-main">
      <p class="verify-intro">These events will trigger focus mode. Toggle any event to add or remove it from focus.</p>
      
      <div id="loading" class="loading">Loading events...</div>
      <div id="events-list" class="events-list hidden"></div>
      <div id="empty-state" class="empty-state hidden">
        <p>No upcoming events in the next 7 days.</p>
      </div>

      <div class="verify-actions">
        <button id="save-btn" class="btn-primary">Save changes</button>
      </div>
    </main>
  </div>
  <script src="verify.js" type="module"></script>
</body>
</html>
